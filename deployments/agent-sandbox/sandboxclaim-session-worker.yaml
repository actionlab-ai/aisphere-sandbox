apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxClaim
metadata:
  name: sess-demo
  namespace: aisphere-sandbox
  labels:
    aisphere.io/managed-by: aisphere-sandbox-adapter
    aisphere.io/session-id: sess-demo
spec:
  warmPoolRef:
    name: aisphere-agent-session-pool
  additionalPodMetadata:
    labels:
      aisphere.io/session-id: sess-demo
      aisphere.io/agent-id: demo-agent
  env:
    - name: AISPHERE_SESSION_ID
      value: sess-demo
      containerName: worker
    - name: AISPHERE_AGENT_ID
      value: demo-agent
      containerName: worker
    - name: AISPHERE_SESSION_WORKER_ENABLED
      value: "true"
      containerName: worker

    - name: AISPHERE_MODEL_BASE_URL
      value: http://aisphere-gateway.aisphere-system.svc:18083/v1
      containerName: worker
    - name: AISPHERE_MODEL_PROFILE
      value: deepseek-v4-agent
      containerName: worker
