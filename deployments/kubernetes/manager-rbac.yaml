apiVersion: v1
kind: Namespace
metadata:
  name: aisphere-sandbox-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aisphere-sandbox-manager
  namespace: aisphere-sandbox-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aisphere-sandbox-manager
  namespace: aisphere-sandbox
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aisphere-sandbox-manager
  namespace: aisphere-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aisphere-sandbox-manager
subjects:
  - kind: ServiceAccount
    name: aisphere-sandbox-manager
    namespace: aisphere-sandbox-system
