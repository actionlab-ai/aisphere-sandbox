apiVersion: v1
kind: Namespace
metadata:
  name: aisphere-sandbox-system
  labels:
    app.kubernetes.io/name: aisphere-sandbox
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aisphere-sandbox
  namespace: aisphere-sandbox-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aisphere-sandbox
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aisphere-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aisphere-sandbox
subjects:
  - kind: ServiceAccount
    name: aisphere-sandbox
    namespace: aisphere-sandbox-system
