name: Build Images

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: Image tag/version override
        required: false
        default: ''

permissions:
  contents: read

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Resolve version
        id: vars
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then VERSION="${{ github.event.inputs.version }}"; elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then VERSION="${GITHUB_REF_NAME}"; else VERSION="${GITHUB_SHA::7}"; fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Build multi-arch images
        env:
          REGISTRY: ghcr.io/actionlab-ai
          VERSION: ${{ steps.vars.outputs.version }}
          PLATFORMS: linux/amd64,linux/arm64
          PUSH: 'false'
        run: scripts/build-images.sh
