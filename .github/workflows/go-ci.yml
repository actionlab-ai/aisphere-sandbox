name: Go CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true
      - run: go mod download
      - name: Check Go formatting
        run: test -z "$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))"
      - run: go test ./...
      - run: go vet ./...
