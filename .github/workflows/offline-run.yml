name: Build Offline Run Packages

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: Package version override
        required: false
        default: ''

permissions:
  contents: read

jobs:
  offline-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Resolve version
        id: vars
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then VERSION="${{ github.event.inputs.version }}"; elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then VERSION="${GITHUB_REF_NAME}"; else VERSION="${GITHUB_SHA::7}"; fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Build offline .run packages
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          ARCHES: amd64 arm64
        run: scripts/build-offline-run.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aisphere-sandbox-offline-run
          path: dist/*.run
